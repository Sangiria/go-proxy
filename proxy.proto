syntax = "proto3";

package goproxy;

message Node {
  string id = 1;
  string type = 2;
  string address = 3;
  int16 port = 4;
  string transport = 5;
  string tls = 6;
  string source = 7;
}

message Nodes {
  repeated Node nodes = 1;
}

message AddNodeRequest {
    string url = 1;
}

//add field "number of the added nodes"
message AddNodeResponse {
    uint code = 1;
    optional string message = 1;
}

service Nodes {
    rpc AddNode (AddNodeRequest) returns (AddNodeResponse);
    rpc GetNodes () returns (Nodes);
}