syntax = "proto3";

package goproxy;

message State {
  repeated Node manual = 1;
  repeated Subscription subscription = 2;
  repeated Id order = 3;
}

message Node {
  string id = 1;
  string type = 2;
  string name = 3;
  string address = 4;
  int32 port = 5;
  string transport = 6;
  string security = 7;
}

message Subscription {
  string id = 1;
  string name = 2;
  Nodes nodes = 3;
}

message Url {
  string url = 1;
}

message NodeForm {
  string id = 1;
  optional string name = 2;
  optional string address = 3;
  optional int32 port = 4;
  optional string uuid = 5;
  optional string transport = 6;
  optional string security = 7;
  optional string sni = 8;
  optional string fp = 9;
  optional string pbk = 10;
  optional string sid = 11;
  optional string mode = 12;
  optional string extra = 13;
  optional string source_id = 14;
}

message SubscriptionForm {
  string id = 1;
  optional string name = 2;
  optional string url = 3;
}

message Id {
  string id = 1;
  optional string source_id = 2;
}

message Nodes {
  repeated Node nodes = 1;
}

message Null {}

service NodeService {
  rpc AddNode (Url) returns (Node);
  rpc AddSubscription (Url) returns (Subscription);
  rpc GetNode (Id) returns (NodeForm);
  rpc GetSubscription (Id) returns (SubscriptionForm);
  rpc EditNode (NodeForm) returns (Null);
  rpc EditSubscription (SubscriptionForm) returns (Null);
  rpc GetFullState (Null) returns (State);
  rpc DeleteNode (Id) returns (Null);
  rpc DeleteSubscription (Id) returns (Null);
  rpc UpdateSubscription (Id) returns (Nodes);
}

enum ProxyState {
  DISCONNECTED = 0;
  CONNECTING = 1;
  CONNECTED = 2;
  ERROR = 3;
}

message ProxyStatus {
  ProxyState state = 1;
  string message = 2;
  double upload_speed = 3;
  double download_speed = 4;
}

message Switch {
  bool switch = 1;
}

service ProxyService {
  rpc SubscribeStatus (Null) returns (stream ProxyStatus);
  rpc StartProxy (Id) returns (Null); 
  rpc StopProxy (Null) returns (Null);
  rpc SwitchNode (Id) returns (Null);
  rpc ToggleTun (Switch) returns (Null);
}