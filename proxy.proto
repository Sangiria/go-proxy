syntax = "proto3";

package goproxy;

option go_package = "./core/api";

message Node {
  string id = 1;
  string type = 2;
  string name = 3;
  string address = 4;
  int32 port = 5;
  string transport = 6;
  string tls = 7;
  string source = 8;
}

message Nodes {
  repeated Node nodes = 1;
}

message AddNodeRequest {
  string url = 1;
}

//add field "number of the added nodes"
message AddNodeResponse {
}

message Null {}

service NodeService {
  rpc AddNode (AddNodeRequest) returns (AddNodeResponse);
  rpc AddSubscription (AddNodeRequest) returns (AddNodeResponse);
  rpc GetNodes (Null) returns (Nodes);
}