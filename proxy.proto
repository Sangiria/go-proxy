syntax = "proto3";

package goproxy;

message Node {
  string id = 1;
  string type = 2;
  string name = 3;
  string address = 4;
  int32 port = 5;
  string transport = 6;
  string tls = 7;
}

message Subscription {
  string id = 1;
  string name = 2;
  repeated Node nodes = 3;
}

message Url {
  string url = 1;
}

service NodeService {
  rpc AddManual (Url) returns (Node);
  rpc AddSubscription (Url) returns (Subscription);
  //rpc GetFullState
}